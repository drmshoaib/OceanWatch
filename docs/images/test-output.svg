<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">OceanWatchAI test output preview</title>
  <desc id="desc">Terminal-style preview showing CMake build and CTest passing all OceanWatchAI tests.</desc>
  <rect width="1200" height="520" fill="#f6f8fa"/>
  <rect x="46" y="38" width="1108" height="444" rx="12" fill="#0d1117" stroke="#30363d"/>
  <rect x="46" y="38" width="1108" height="52" rx="12" fill="#161b22"/>
  <text x="78" y="70" fill="#c9d1d9" font-family="Consolas, 'Courier New', monospace" font-size="18">CMake + CTest verification</text>

  <text x="78" y="130" fill="#7ee787" font-family="Consolas, 'Courier New', monospace" font-size="19">cmake --preset ninja-debug</text>
  <text x="78" y="164" fill="#7ee787" font-family="Consolas, 'Courier New', monospace" font-size="19">cmake --build --preset ninja-debug</text>
  <text x="78" y="198" fill="#7ee787" font-family="Consolas, 'Courier New', monospace" font-size="19">cmake --build out/build/ninja-debug --target test</text>

  <rect x="78" y="234" width="486" height="164" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="104" y="276" fill="#f0f6fc" font-family="Consolas, 'Courier New', monospace" font-size="22">100% tests passed</text>
  <text x="104" y="318" fill="#3fb950" font-family="Consolas, 'Courier New', monospace" font-size="22">0 tests failed out of 38</text>
  <text x="104" y="360" fill="#8b949e" font-family="Consolas, 'Courier New', monospace" font-size="18">Total Test time: 18.39 sec</text>

  <rect x="610" y="130" width="458" height="268" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="636" y="172" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Covered modules</text>
  <text x="636" y="216" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="17">AIS CSV loader</text>
  <text x="636" y="250" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="17">Geospatial utilities</text>
  <text x="636" y="284" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="17">Feature extraction</text>
  <text x="636" y="318" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="17">Risk scoring and anomaly detection</text>
  <text x="636" y="352" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="17">Protected-area proximity and reports</text>

  <text x="78" y="444" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="16">Local verification was run with the Visual Studio MSVC environment and Ninja CMake preset.</text>
